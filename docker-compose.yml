services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-benkyou}
      POSTGRES_USER: ${POSTGRES_USER:-benkyou}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - benkyou_postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-benkyou} -d ${POSTGRES_DB:-benkyou}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BENKYOU_WEB_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-benkyou}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-benkyou}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_API_KEY: ${AI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      GENERATION_RATE_LIMIT_MAX: ${GENERATION_RATE_LIMIT_MAX:-5}
      GENERATION_RATE_LIMIT_WINDOW_HOURS: ${GENERATION_RATE_LIMIT_WINDOW_HOURS:-24}

volumes:
  benkyou_postgres:
